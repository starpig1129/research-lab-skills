<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#ffffff"/>
  <!-- Top bar -->
  <rect width="1200" height="6" fill="#1e3a5f"/>
  <!-- Bottom accent -->
  <rect y="620" width="1200" height="55" fill="#f8fafc"/>
  <rect y="620" width="1200" height="1.5" fill="#e2e8f0"/>

  <!-- Title -->
  <text x="60" y="70" font-size="32" font-weight="700" fill="#1e3a5f">From Log to Slides — in One Command</text>
  <rect x="60" y="82" width="1080" height="1.5" fill="#e2e8f0"/>

  <!-- Pipeline visual -->
  <!-- Node 1: research-log -->
  <rect x="60" y="115" width="220" height="60" rx="6" fill="#1e3a5f"/>
  <text x="170" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">/research-log add</text>
  <text x="170" y="160" text-anchor="middle" font-size="12" fill="#93c5fd">experiment entry</text>
  <!-- Arrow -->
  <line x1="280" y1="145" x2="330" y2="145" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr2)"/>
  <defs>
    <marker id="arr2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/>
    </marker>
  </defs>
  <!-- Node 2: .md file -->
  <rect x="330" y="115" width="200" height="60" rx="6" fill="#f8fafc" stroke="#1e3a5f" stroke-width="1.5"/>
  <text x="430" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#1e3a5f">2026-06-12_demo.md</text>
  <text x="430" y="160" text-anchor="middle" font-size="12" fill="#64748b">git_head: a417f35</text>
  <!-- Arrow -->
  <line x1="530" y1="145" x2="580" y2="145" stroke="#1e3a5f" stroke-width="2" marker-end="url(#arr2)"/>
  <!-- Node 3: report-slides -->
  <rect x="580" y="115" width="220" height="60" rx="6" fill="#1e3a5f"/>
  <text x="690" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">/report-slides</text>
  <text x="690" y="160" text-anchor="middle" font-size="12" fill="#93c5fd">SVG deck generated</text>
  <!-- Arrow -->
  <line x1="800" y1="145" x2="850" y2="145" stroke="#059669" stroke-width="2" marker-end="url(#arr3)"/>
  <defs>
    <marker id="arr3" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#059669"/>
    </marker>
  </defs>
  <!-- Node 4: pptx -->
  <rect x="850" y="115" width="200" height="60" rx="6" fill="#059669"/>
  <text x="950" y="140" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">deck.pptx</text>
  <text x="950" y="160" text-anchor="middle" font-size="12" fill="#d1fae5">native editable shapes</text>

  <!-- Divider -->
  <rect x="60" y="210" width="1080" height="1" fill="#e2e8f0"/>

  <!-- Conclusions section -->
  <text x="60" y="255" font-size="20" font-weight="700" fill="#1e3a5f">Key Takeaways</text>

  <circle cx="80" cy="295" r="6" fill="#1e3a5f"/>
  <text x="100" y="300" font-size="16" fill="#374151">This slide deck was generated from a single log entry — <tspan font-weight="600">2026-06-12_demo.md</tspan></text>

  <circle cx="80" cy="335" r="6" fill="#1e3a5f"/>
  <text x="100" y="340" font-size="16" fill="#374151">Git context (HEAD <tspan font-family="monospace" font-size="15">a417f35</tspan>) was captured automatically — no manual input needed</text>

  <circle cx="80" cy="375" r="6" fill="#1e3a5f"/>
  <text x="100" y="380" font-size="16" fill="#374151">The full workflow: log → index → slides → PPTX runs entirely inside your AI coding tool</text>

  <!-- Next steps -->
  <rect x="60" y="415" width="1080" height="1" fill="#e2e8f0"/>
  <text x="60" y="455" font-size="20" font-weight="700" fill="#059669">Try It Now</text>

  <rect x="80" y="470" width="10" height="10" rx="2" fill="#059669"/>
  <text x="105" y="481" font-size="16" fill="#374151">Install: <tspan font-family="monospace" font-size="15" fill="#1e3a5f">bash install.sh</tspan>  — adds skills to Claude Code / Copilot CLI / Gemini CLI</text>

  <rect x="80" y="500" width="10" height="10" rx="2" fill="#059669"/>
  <text x="105" y="511" font-size="16" fill="#374151">Log your next experiment: <tspan font-family="monospace" font-size="15" fill="#1e3a5f">/research-log add</tspan></text>

  <rect x="80" y="530" width="10" height="10" rx="2" fill="#059669"/>
  <text x="105" y="541" font-size="16" fill="#374151">Generate a deck anytime: <tspan font-family="monospace" font-size="15" fill="#1e3a5f">/report-slides</tspan></text>

  <!-- Footer -->
  <text x="600" y="655" text-anchor="middle" font-size="13" fill="#64748b">research-lab-skills · 2026-06-12</text>
  <text x="1140" y="655" text-anchor="end" font-size="13" fill="#64748b">5 / 5</text>
</svg>
