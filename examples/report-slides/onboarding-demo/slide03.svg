<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" font-family="'Helvetica Neue', Arial, sans-serif">
  <!-- Background -->
  <rect width="1200" height="675" fill="#ffffff"/>
  <!-- Top bar -->
  <rect width="1200" height="6" fill="#1e3a5f"/>

  <!-- Title -->
  <text x="60" y="70" font-size="32" font-weight="700" fill="#1e3a5f">How It Works — 3 Steps</text>
  <rect x="60" y="82" width="1080" height="1.5" fill="#e2e8f0"/>

  <!-- Step 1 box -->
  <rect x="60" y="115" width="310" height="400" rx="10" fill="#f8fafc" stroke="#1e3a5f" stroke-width="2"/>
  <!-- Step number circle -->
  <circle cx="215" cy="155" r="24" fill="#1e3a5f"/>
  <text x="215" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">1</text>
  <!-- Step title -->
  <text x="215" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a5f">/research-log add</text>
  <rect x="80" y="222" width="270" height="1" fill="#e2e8f0"/>
  <!-- Code block look -->
  <rect x="80" y="233" width="270" height="44" rx="4" fill="#1e3a5f" opacity="0.08"/>
  <text x="215" y="260" text-anchor="middle" font-size="14" fill="#1e3a5f" font-family="monospace">/research-log add</text>
  <!-- Description lines -->
  <text x="215" y="310" text-anchor="middle" font-size="14" fill="#374151">Claude asks: Quick or Full?</text>
  <text x="215" y="335" text-anchor="middle" font-size="14" fill="#374151">Fills in goal, results, notes</text>
  <text x="215" y="360" text-anchor="middle" font-size="14" fill="#374151">Reads git log silently</text>
  <text x="215" y="385" text-anchor="middle" font-size="14" fill="#374151">Captures HEAD commit SHA</text>
  <text x="215" y="410" text-anchor="middle" font-size="14" fill="#374151">Links to prior experiment</text>
  <!-- Label -->
  <rect x="130" y="475" width="170" height="28" rx="14" fill="#1e3a5f" opacity="0.1"/>
  <text x="215" y="494" text-anchor="middle" font-size="13" fill="#1e3a5f">Interactive + Auto</text>

  <!-- Arrow 1→2 -->
  <line x1="375" y1="315" x2="435" y2="315" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#1e3a5f"/>
    </marker>
  </defs>

  <!-- Step 2 box -->
  <rect x="445" y="115" width="310" height="400" rx="10" fill="#f8fafc" stroke="#1e3a5f" stroke-width="2"/>
  <circle cx="600" cy="155" r="24" fill="#1e3a5f"/>
  <text x="600" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">2</text>
  <text x="600" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#1e3a5f">Structured .md Created</text>
  <rect x="465" y="222" width="270" height="1" fill="#e2e8f0"/>
  <rect x="465" y="233" width="270" height="90" rx="4" fill="#1e3a5f" opacity="0.06"/>
  <text x="600" y="254" text-anchor="middle" font-size="12" fill="#374151" font-family="monospace">docs/research_log/</text>
  <text x="600" y="272" text-anchor="middle" font-size="12" fill="#059669" font-family="monospace">2026-06-12_demo.md</text>
  <text x="600" y="292" text-anchor="middle" font-size="11" fill="#64748b" font-family="monospace">git_head: a417f35</text>
  <text x="600" y="310" text-anchor="middle" font-size="11" fill="#64748b" font-family="monospace">follows: baseline_v1</text>
  <text x="600" y="345" text-anchor="middle" font-size="14" fill="#374151">YAML frontmatter + sections</text>
  <text x="600" y="370" text-anchor="middle" font-size="14" fill="#374151">Git context auto-embedded</text>
  <text x="600" y="395" text-anchor="middle" font-size="14" fill="#374151">INDEX.md rebuilt instantly</text>
  <rect x="510" y="475" width="180" height="28" rx="14" fill="#1e3a5f" opacity="0.1"/>
  <text x="600" y="494" text-anchor="middle" font-size="13" fill="#1e3a5f">Durable + Queryable</text>

  <!-- Arrow 2→3 -->
  <line x1="760" y1="315" x2="820" y2="315" stroke="#1e3a5f" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Step 3 box -->
  <rect x="830" y="115" width="310" height="400" rx="10" fill="#f8fafc" stroke="#059669" stroke-width="2"/>
  <circle cx="985" cy="155" r="24" fill="#059669"/>
  <text x="985" y="162" text-anchor="middle" font-size="20" font-weight="700" fill="#ffffff">3</text>
  <text x="985" y="210" text-anchor="middle" font-size="19" font-weight="700" fill="#059669">/report-slides</text>
  <rect x="850" y="222" width="270" height="1" fill="#e2e8f0"/>
  <rect x="850" y="233" width="270" height="44" rx="4" fill="#059669" opacity="0.08"/>
  <text x="985" y="260" text-anchor="middle" font-size="14" fill="#059669" font-family="monospace">/report-slides</text>
  <text x="985" y="310" text-anchor="middle" font-size="14" fill="#374151">Claude reads all log entries</text>
  <text x="985" y="335" text-anchor="middle" font-size="14" fill="#374151">Proposes a slide outline</text>
  <text x="985" y="360" text-anchor="middle" font-size="14" fill="#374151">Generates SVG deck</text>
  <text x="985" y="385" text-anchor="middle" font-size="14" fill="#374151">Exports editable .pptx</text>
  <text x="985" y="410" text-anchor="middle" font-size="14" fill="#374151">Updates log slide_decks field</text>
  <rect x="895" y="475" width="180" height="28" rx="14" fill="#059669" opacity="0.12"/>
  <text x="985" y="494" text-anchor="middle" font-size="13" fill="#059669">Shareable in minutes</text>

  <!-- Footer -->
  <text x="600" y="655" text-anchor="middle" font-size="13" fill="#64748b">research-lab-skills · 2026-06-12</text>
