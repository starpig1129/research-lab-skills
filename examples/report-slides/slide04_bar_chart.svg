  <!-- legend -->
  <rect x="940" y="115" width="18" height="18" fill="#1f618d" rx="2"/>
  <text x="964" y="129" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50">English QWK</text>
  <rect x="940" y="143" width="18" height="18" fill="#1e8449" rx="2"/>
  <text x="964" y="157" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50">zh-TW QWK</text>

  <!-- note -->
  <text x="600" y="618" font-family="'Helvetica Neue', Arial, sans-serif"
