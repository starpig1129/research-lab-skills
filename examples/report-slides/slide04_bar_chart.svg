  <!-- zh-TW: 0.784 → h=345, y=185 -->
  <rect x="531" y="185" width="60" height="345" fill="#1e8449" rx="3"/>
  <text x="561" y="178" font-family="'Helvetica Neue', Arial, sans-serif"
