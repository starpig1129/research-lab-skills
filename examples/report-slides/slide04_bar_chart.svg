  <text x="512" y="570" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#2c3e50" text-anchor="middle">mBERT-FT</text>
  <text x="512" y="589" font-family="'Helvetica Neue', Arial, sans-serif"
