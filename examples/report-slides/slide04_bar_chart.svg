  <!-- best model badge -->
  <rect x="753" y="82" width="122" height="24" rx="4" fill="#d5f5e3" stroke="#1e8449" stroke-width="1"/>
  <text x="814" y="98" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#1e8449" text-anchor="middle">✓ Best Model</text>
  <text x="812" y="570" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#2c3e50" text-anchor="middle">ZH-BERT-FT</text>
  <text x="812" y="589" font-family="'Helvetica Neue', Arial, sans-serif"
