  <!-- zh-TW: 0.541 → h=0.541×440=238, y=530-238=292 -->
  <rect x="231" y="292" width="60" height="238" fill="#1e8449" rx="3"/>
  <text x="261" y="284" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="600" fill="#c0392b" text-anchor="middle">0.541</text>
  <text x="212" y="570" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#2c3e50" text-anchor="middle">EN-BERT-ZS</text>
  <text x="212" y="589" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" fill="#7f8c8d" text-anchor="middle">(zero-shot)</text>

  <!-- Group 2: mBERT-FT — centered x=515 -->
  <!-- EN: 0.831 → h=366, y=164 -->
  <rect x="463" y="164" width="60" height="366" fill="#1f618d" rx="3"/>
  <text x="493" y="157" font-family="'Helvetica Neue', Arial, sans-serif"
