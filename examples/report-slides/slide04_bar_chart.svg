<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <rect width="1200" height="675" fill="#ffffff"/>
  <rect width="1200" height="6" fill="#1e3a5f"/>

  <text x="60" y="58" font-family="'Helvetica Neue', Arial, sans-serif" font-size="28" font-weight="700" fill="#1e3a5f">Cross-Lingual QWK — EN vs zh-TW by Model Strategy</text>
  <rect x="60" y="70" width="1080" height="2" fill="#e2e8f0"/>

  <!-- chart area: x=90..1100, y=100..560; height=460 -->
  <!-- y-axis: 0.0 to 1.0 in 0.2 steps; step=92px -->

  <!-- y-axis labels -->
  <text x="78" y="564" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">0.0</text>
  <text x="78" y="472" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">0.2</text>
  <text x="78" y="380" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">0.4</text>
  <text x="78" y="288" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">0.6</text>
  <text x="78" y="196" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">0.8</text>
  <text x="78" y="104" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="end">1.0</text>

  <!-- grid lines -->
  <line x1="90" y1="560" x2="1100" y2="560" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="90" y1="468" x2="1100" y2="468" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="90" y1="376" x2="1100" y2="376" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="90" y1="284" x2="1100" y2="284" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="90" y1="192" x2="1100" y2="192" stroke="#e2e8f0" stroke-width="1"/>
  <line x1="90" y1="100" x2="1100" y2="100" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Group 1: EN-BERT-ZS (x=180) -->
  <!-- EN: 0.853 → h=0.853×460=392.4, y=560-392=168 -->
  <rect x="152" y="168" width="55" height="392" fill="#1e3a5f" rx="3"/>
  <text x="179" y="161" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a5f" text-anchor="middle">0.853</text>
  <!-- zh-TW: 0.541 → h=0.541×460=248.9, y=560-249=311 -->
  <rect x="215" y="311" width="55" height="249" fill="#059669" rx="3"/>
  <text x="242" y="304" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#dc2626" text-anchor="middle">0.541</text>
  <text x="216" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">EN-BERT-ZS</text>
  <text x="216" y="614" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">(zero-shot)</text>

  <!-- Group 2: mBERT-FT (x=490) -->
  <!-- EN: 0.831 → h=382.3, y=178 -->
  <rect x="462" y="178" width="55" height="382" fill="#1e3a5f" rx="3"/>
  <text x="489" y="171" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a5f" text-anchor="middle">0.831</text>
  <!-- zh-TW: 0.784 → h=360.6, y=199 -->
  <rect x="525" y="199" width="55" height="361" fill="#059669" rx="3"/>
  <text x="552" y="192" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#059669" text-anchor="middle">0.784</text>
  <text x="516" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">mBERT-FT</text>
  <text x="516" y="614" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">(translated)</text>

  <!-- Group 3: ZH-BERT-FT (x=800) — best model -->
  <!-- EN: 0.828 → h=380.9, y=179 -->
  <rect x="772" y="179" width="55" height="381" fill="#1e3a5f" rx="3"/>
  <text x="799" y="172" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a5f" text-anchor="middle">0.828</text>
  <!-- zh-TW: 0.811 → h=373.1, y=187 -->
  <rect x="835" y="187" width="55" height="373" fill="#059669" rx="3"/>
  <text x="862" y="180" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#059669" text-anchor="middle">0.811</text>
  <!-- best model badge -->
  <rect x="762" y="92" width="115" height="22" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="819" y="107" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#059669" text-anchor="middle">✓ Best Model</text>
  <text x="820" y="598" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#374151" text-anchor="middle">ZH-BERT-FT</text>
  <text x="820" y="614" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">(language-matched)</text>

  <!-- legend -->
  <rect x="930" y="130" width="16" height="16" fill="#1e3a5f" rx="2"/>
  <text x="952" y="143" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#374151">English QWK</text>
  <rect x="930" y="156" width="16" height="16" fill="#059669" rx="2"/>
  <text x="952" y="169" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#374151">zh-TW QWK</text>

  <!-- note -->
  <text x="600" y="640" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Prompts P1–P4 · test set · macro-average QWK</text>
  <rect x="0" y="648" width="1200" height="1" fill="#e2e8f0"/>
  <text x="600" y="663" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cross-Lingual ESAS · Weekly Progress · 2026-05-25</text>
</svg>
