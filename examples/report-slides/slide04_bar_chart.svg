  <!-- zh-TW: 0.811 → h=357, y=173 -->
  <rect x="831" y="173" width="60" height="357" fill="#1e8449" rx="3"/>
  <text x="861" y="166" font-family="'Helvetica Neue', Arial, sans-serif"
