  <!-- Group 3: ZH-BERT-FT (best model) — centered x=815 -->
  <!-- EN: 0.828 → h=364, y=166 -->
  <rect x="763" y="166" width="60" height="364" fill="#1f618d" rx="3"/>
  <text x="793" y="159" font-family="'Helvetica Neue', Arial, sans-serif"
