  <line x1="60" y1="65" x2="1140" y2="65" stroke="#d5dbdb" stroke-width="1.5"/>

  <!-- chart area: x=100..1020, y=90..530; height=440 -->
  <!-- y-axis: 0.0 to 1.0 in 0.2 steps; step = 88px -->

  <!-- y-axis labels -->
  <text x="88" y="534" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">0.0</text>
  <text x="88" y="446" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">0.2</text>
  <text x="88" y="358" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">0.4</text>
  <text x="88" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">0.6</text>
  <text x="88" y="182" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">0.8</text>
  <text x="88" y="94" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" fill="#7f8c8d" text-anchor="end">1.0</text>

  <!-- grid lines -->
  <line x1="100" y1="530" x2="1020" y2="530" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="100" y1="442" x2="1020" y2="442" stroke="#d5dbdb" stroke-width="0.75"/>
  <line x1="100" y1="354" x2="1020" y2="354" stroke="#d5dbdb" stroke-width="0.75"/>
  <line x1="100" y1="266" x2="1020" y2="266" stroke="#d5dbdb" stroke-width="0.75"/>
  <line x1="100" y1="178" x2="1020" y2="178" stroke="#d5dbdb" stroke-width="0.75"/>
  <line x1="100" y1="90"  x2="1020" y2="90"  stroke="#d5dbdb" stroke-width="0.75"/>

  <!-- Group 1: EN-BERT-ZS (zero-shot transfer) — centered x=215 -->
  <!-- EN: 0.853 → h=0.853×440=375, y=530-375=155 -->
  <rect x="163" y="155" width="60" height="375" fill="#1f618d" rx="3"/>
  <text x="193" y="148" font-family="'Helvetica Neue', Arial, sans-serif"
