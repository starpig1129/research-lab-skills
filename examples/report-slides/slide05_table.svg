<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <path d="M 0,0 H 1200 V 675 H 0 Z" fill="#ffffff"/>
  <rect width="1200" height="5" fill="#1f618d"/>

  <!-- title -->
  <text x="60" y="52" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="26" font-weight="700" fill="#1f618d">Model Comparison — Key Metrics</text>
  <line x1="60" y1="65" x2="1140" y2="65" stroke="#d5dbdb" stroke-width="1.5"/>

  <!-- table: x=60..1140; col widths: 340,160,160,150,150 → total=960 -->
  <!-- col x starts: 60, 400, 560, 720, 870 -->

  <!-- header row (y=82, h=50) -->
  <path d="M 64,82 H 1136 A 4,4 0 0,1 1140,86 V 128 A 4,4 0 0,1 1136,132 H 64 A 4,4 0 0,1 60,128 V 86 A 4,4 0 0,1 64,82 Z" fill="#1f618d"/>
  <path d="M 60,102 H 1140 V 132 H 60 Z" fill="#1f618d"/>
  <text x="230" y="113" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Model</text>
  <text x="480" y="113" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">EN QWK</text>
  <text x="640" y="113" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">zh-TW QWK</text>
  <text x="795" y="113" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">Δ Drop</text>
  <text x="955" y="113" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#ffffff" text-anchor="middle">DIF Flags</text>

  <!-- col dividers in header -->
  <line x1="400" y1="82" x2="400" y2="132" stroke="#3a7ab3" stroke-width="1"/>
  <line x1="560" y1="82" x2="560" y2="132" stroke="#3a7ab3" stroke-width="1"/>
  <line x1="720" y1="82" x2="720" y2="132" stroke="#3a7ab3" stroke-width="1"/>
  <line x1="870" y1="82" x2="870" y2="132" stroke="#3a7ab3" stroke-width="1"/>

  <!-- Row 1: GPT-4 zero-shot baseline (y=132, h=75) -->
  <path d="M 60,132 H 1140 V 207 H 60 Z" fill="#f2f3f4"/>
  <text x="80" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50">GPT-4 zero-shot  <tspan font-style="italic" fill="#7f8c8d">(baseline)</tspan></text>
  <text x="480" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">0.674</text>
  <text x="640" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#b0b8c1" text-anchor="middle">—</text>
  <text x="795" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#b0b8c1" text-anchor="middle">—</text>
  <text x="955" y="178" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#b0b8c1" text-anchor="middle">—</text>
  <line x1="60" y1="207" x2="1140" y2="207" stroke="#d5dbdb" stroke-width="1"/>

  <!-- Row 2: EN-BERT-ZS transfer (y=207, h=75) — danger highlight -->
  <path d="M 60,207 H 1140 V 282 H 60 Z" fill="#ffffff"/>
  <text x="80" y="253" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50">EN-BERT-ZS Transfer</text>
  <text x="480" y="253" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">0.853</text>
  <text x="640" y="253" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" fill="#2c3e50" text-anchor="middle">0.541</text>
  <text x="795" y="253" font-family="'Helvetica Neue', Arial, sans-serif" font-size="16" font-weight="600" fill="#c0392b" text-anchor="middle">−0.312</text>
  <!-- DIF badge: danger -->
  <rect x="893" y="233" width="90" height="28" rx="4" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="938" y="251" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="600" fill="#c0392b" text-anchor="middle">6 / 12</text>
  <line x1="60" y1="282" x2="1140" y2="282" stroke="#d5dbdb" stroke-width="1"/>

  <!-- Row 3: ZH-BERT-FT best model (y=282, h=80) — green highlight -->
  <path d="M 60,282 H 1140 V 362 H 60 Z" fill="#eafaf1" stroke="#a9dfbf" stroke-width="1"/>
  <text x="80" y="332" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="700" fill="#1e8449">ZH-BERT-FT</text>
  <!-- best model badge -->
  <rect x="238" y="318" width="105" height="22" rx="3" fill="#d5f5e3" stroke="#1e8449" stroke-width="1"/>
  <text x="290" y="333" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="13" font-weight="600" fill="#1e8449" text-anchor="middle">✓ Best Model</text>
  <text x="480" y="332" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#1e8449" text-anchor="middle">0.828</text>
  <text x="640" y="332" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="700" fill="#1e8449" text-anchor="middle">0.811</text>
  <text x="795" y="332" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="16" font-weight="600" fill="#1e8449" text-anchor="middle">−0.017</text>
  <!-- DIF badge: success -->
  <rect x="893" y="318" width="90" height="28" rx="4" fill="#d5f5e3" stroke="#1e8449" stroke-width="1"/>
  <text x="938" y="336" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" font-weight="700" fill="#1e8449" text-anchor="middle">0 / 12</text>

  <!-- table bottom border -->
  <rect x="60" y="362" width="1080" height="2" fill="#d5dbdb"/>

  <!-- col vertical dividers -->
  <line x1="400" y1="132" x2="400" y2="362" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="560" y1="132" x2="560" y2="362" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="720" y1="132" x2="720" y2="362" stroke="#d5dbdb" stroke-width="1"/>
  <line x1="870" y1="132" x2="870" y2="362" stroke="#d5dbdb" stroke-width="1"/>

  <!-- notes -->
  <text x="60" y="393" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="14" fill="#7f8c8d">QWK = Quadratic Weighted Kappa  ·  DIF = Differential Item Functioning (Mantel-Haenszel, p&lt;.05)</text>

  <!-- DIF legend -->
  <rect x="60" y="412" width="14" height="14" rx="2" fill="#fadbd8" stroke="#c0392b" stroke-width="1"/>
  <text x="82" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#7f8c8d">High bias (≥4 flags)</text>
  <rect x="290" y="412" width="14" height="14" rx="2" fill="#d5f5e3" stroke="#1e8449" stroke-width="1"/>
  <text x="312" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" fill="#7f8c8d">No bias (0 flags)</text>

  <!-- summary bar -->
  <path d="M 66,448 H 1134 A 6,6 0 0,1 1140,454 V 504 A 6,6 0 0,1 1134,510 H 66 A 6,6 0 0,1 60,504 V 454 A 6,6 0 0,1 66,448 Z" fill="#eafaf1" stroke="#a9dfbf" stroke-width="1.5"/>
  <text x="600" y="474" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="600" fill="#1e8449" text-anchor="middle">ZH-BERT-FT: human-parity cross-lingual scoring with zero fairness violations</text>
  <text x="600" y="498" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="15" fill="#2c3e50" text-anchor="middle">Language-matched fine-tuning eliminates the −0.312 drop seen in zero-shot transfer</text>

  <!-- footer -->
  <line x1="0" y1="648" x2="1200" y2="648" stroke="#d5dbdb" stroke-width="1"/>
  <text x="600" y="663" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="12" fill="#7f8c8d" text-anchor="middle">Cross-Lingual ESAS  ·  Weekly Progress  ·  2026-05-25</text>
</svg>
