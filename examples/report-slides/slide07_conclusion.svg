  <text x="121" y="349" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="600" fill="#1f618d">Rubric-prefix is highest-value intervention</text>
  <text x="121" y="373" font-family="'Helvetica Neue', Arial, sans-serif"
