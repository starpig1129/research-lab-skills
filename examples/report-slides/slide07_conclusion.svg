  <text x="121" y="258" font-family="'Helvetica Neue', Arial, sans-serif"
        font-size="17" font-weight="600" fill="#1f618d">Zero-shot transfer is inaccurate and unfair</text>
  <text x="121" y="282" font-family="'Helvetica Neue', Arial, sans-serif"
