  <text x="503" y="421" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="700">QWK 0.811</text>
  <rect x="556" y="405" width="80" height="24" rx="4" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="596" y="421" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="700">0 DIF ✓</text>

