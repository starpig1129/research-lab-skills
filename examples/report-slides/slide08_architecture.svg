  <text x="965" y="340" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="1">FAIRNESS ANALYSIS</text>
  <text x="965" y="395" font-family="'Helvetica Neue', Arial, sans-serif" font-size="64" font-weight="800" fill="#059669" text-anchor="middle">0/12</text>
  <text x="965" y="423" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" fill="#64748b" text-anchor="middle">DIF flags · Mantel-Haenszel</text>
  <text x="965" y="445" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="600">Zero systematic bias detected</text>

