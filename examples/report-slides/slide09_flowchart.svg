<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <filter id="sh" x="-10%" y="-10%" width="130%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000018"/>
    </filter>
    <marker id="a0" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#94a3b8"/>
    </marker>
    <marker id="ag" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#059669"/>
    </marker>
    <marker id="ar" markerWidth="10" markerHeight="8" refX="9" refY="4" orient="auto">
      <path d="M0,0 L0,8 L10,4 z" fill="#dc2626"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#f8fafc"/>
  <rect width="1200" height="6" fill="#1e3a5f"/>

  <text x="60" y="52" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a5f">Research Journey — Three-Phase Evolution</text>
  <rect x="60" y="64" width="1080" height="2" fill="#e2e8f0"/>

  <!-- ─── TOP LABEL: "Why each approach was tried and what was learned" ─── -->
  <text x="600" y="88" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Each phase built on the failure of the previous — zero-shot → fine-tuned → language-matched</text>

  <!-- ═══════════════════════════════════════════════════════
       THREE PHASE CARDS  (horizontal, centered, equally spaced)
       Card width 290px, gap 45px
       x positions: Phase1=60, Phase2=395, Phase3=730
       Card height = 340px, y=110..450
  ═══════════════════════════════════════════════════════ -->

  <!-- ─── PHASE 1: GPT-4 Zero-Shot ─── -->
  <rect x="60" y="110" width="290" height="340" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#sh)"/>
  <!-- header -->
  <rect x="60" y="110" width="290" height="52" rx="12" fill="#64748b"/>
  <rect x="60" y="138" width="290" height="24" fill="#64748b"/>
  <!-- phase number -->
  <circle cx="96" cy="136" r="16" fill="#ffffff"/>
  <text x="96" y="141" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800" fill="#64748b" text-anchor="middle">1</text>
  <text x="218" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Zero-Shot</text>
  <text x="218" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#e2e8f0" text-anchor="middle">GPT-4 · No training</text>

  <!-- big QWK number -->
  <text x="205" y="232" font-family="'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="800" fill="#64748b" text-anchor="middle">0.674</text>
  <text x="205" y="256" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">Quadratic Weighted Kappa</text>

  <!-- divider -->
  <line x1="84" y1="272" x2="336" y2="272" stroke="#e2e8f0" stroke-width="1"/>

  <!-- findings -->
  <text x="84" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151" font-weight="600">What we learned:</text>
  <text x="84" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">Argumentation prompts (P2, P7) hard</text>
  <text x="84" y="333" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">without explicit rubric grounding</text>
  <text x="84" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">Score-distribution bias: overestimates</text>
  <text x="84" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">mid-range by ~18%</text>

  <!-- outcome badge -->
  <rect x="84" y="388" width="242" height="28" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1"/>
  <text x="205" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151" text-anchor="middle">Next: fine-tune with rubric prefix →</text>
  <text x="205" y="437" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">2026-05-10</text>

  <!-- ─── ARROW 1 → 2 ─── -->
  <line x1="350" y1="280" x2="392" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a0)"/>
  <!-- fail annotation -->
  <rect x="344" y="258" width="60" height="18" rx="4" fill="#fee2e2"/>
  <text x="374" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle" font-weight="600">Too low</text>

  <!-- ─── PHASE 2: BERT Fine-Tuned ─── -->
  <rect x="395" y="110" width="290" height="340" rx="12" fill="#ffffff" stroke="#e2e8f0" stroke-width="2" filter="url(#sh)"/>
  <rect x="395" y="110" width="290" height="52" rx="12" fill="#d97706"/>
  <rect x="395" y="138" width="290" height="24" fill="#d97706"/>
  <circle cx="431" cy="136" r="16" fill="#ffffff"/>
  <text x="431" y="141" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800" fill="#d97706" text-anchor="middle">2</text>
  <text x="553" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Fine-Tuned (EN)</text>
  <text x="553" y="152" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#fef3c7" text-anchor="middle">BERT · rubric prefix · per-prompt</text>

  <text x="540" y="232" font-family="'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="800" fill="#d97706" text-anchor="middle">0.836</text>
  <text x="540" y="256" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#94a3b8" text-anchor="middle">English QWK · test set</text>

  <line x1="419" y1="272" x2="671" y2="272" stroke="#e2e8f0" stroke-width="1"/>

  <text x="419" y="296" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151" font-weight="600">What we learned:</text>
  <text x="419" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">Rubric prefix = +2.2pp on P2/P7</text>
  <text x="419" y="333" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">Per-prompt beats cross-prompt by 1.7pp</text>
  <text x="419" y="353" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#dc2626">zh-TW transfer: QWK=0.541 — fails</text>
  <text x="419" y="370" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#dc2626">6/12 score levels show DIF bias</text>

  <rect x="419" y="388" width="242" height="28" rx="6" fill="#fef9c3" stroke="#fde047" stroke-width="1"/>
  <text x="540" y="406" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#92400e" text-anchor="middle">Next: train on zh-TW directly →</text>
  <text x="540" y="437" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">2026-05-18 (amended 2026-05-20)</text>

  <!-- ─── ARROW 2 → 3 ─── -->
  <line x1="685" y1="280" x2="727" y2="280" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#a0)"/>
  <rect x="678" y="258" width="60" height="18" rx="4" fill="#fee2e2"/>
  <text x="708" y="270" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle" font-weight="600">DIF bias</text>

  <!-- ─── PHASE 3: ZH-BERT Language-Matched ─── -->
  <rect x="730" y="106" width="298" height="348" rx="12" fill="#f0fdf4" stroke="#059669" stroke-width="2.5" filter="url(#sh)"/>
  <rect x="730" y="106" width="298" height="52" rx="12" fill="#059669"/>
  <rect x="730" y="134" width="298" height="24" fill="#059669"/>
  <circle cx="766" cy="132" r="16" fill="#ffffff"/>
  <text x="766" y="137" font-family="'Helvetica Neue', Arial, sans-serif" font-size="14" font-weight="800" fill="#059669" text-anchor="middle">3</text>
  <text x="892" y="128" font-family="'Helvetica Neue', Arial, sans-serif" font-size="15" font-weight="700" fill="#ffffff" text-anchor="middle">Language-Matched</text>
  <text x="892" y="148" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#dcfce7" text-anchor="middle">ZH-BERT · zh-TW training data</text>

  <text x="879" y="228" font-family="'Helvetica Neue', Arial, sans-serif" font-size="60" font-weight="800" fill="#059669" text-anchor="middle">0.811</text>
  <text x="879" y="252" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">zh-TW QWK · test set</text>

  <line x1="754" y1="268" x2="1014" y2="268" stroke="#bbf7d0" stroke-width="1"/>

  <text x="754" y="292" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151" font-weight="600">What we achieved:</text>
  <text x="754" y="312" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669">EN↔zh-TW gap = only −0.017</text>
  <text x="754" y="329" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669">0/12 DIF flags — zero bias</text>
  <text x="754" y="346" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">Annotation κ = 0.84 (P1–P4)</text>
  <text x="754" y="363" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#374151">P5–P8 annotation pending (budget)</text>

  <rect x="754" y="381" width="254" height="28" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.5"/>
  <text x="881" y="399" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#059669" text-anchor="middle" font-weight="700">★ Production Candidate</text>
  <text x="879" y="430" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#94a3b8" text-anchor="middle">2026-05-25 (amended ×2)</text>

  <!-- ─── BOTTOM INSIGHT BAR ─── -->
  <rect x="60" y="470" width="1080" height="50" rx="8" fill="#1e3a5f"/>
  <text x="600" y="495" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="600" fill="#ffffff" text-anchor="middle">Key insight: rubric-prefix conditioning (+2.2pp) + language-matched training = production-grade fairness</text>
  <text x="600" y="513" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#93c5fd" text-anchor="middle">Each failure provided the exact signal needed for the next design decision</text>

  <!-- ─── TIMELINE AXIS at bottom ─── -->
  <line x1="205" y1="560" x2="879" y2="560" stroke="#e2e8f0" stroke-width="2"/>
  <circle cx="205" cy="560" r="5" fill="#64748b"/>
  <circle cx="540" cy="560" r="5" fill="#d97706"/>
  <circle cx="879" cy="560" r="5" fill="#059669"/>
  <text x="205" y="578" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">May 10</text>
  <text x="540" y="578" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#d97706" text-anchor="middle">May 18</text>
  <text x="879" y="578" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#059669" text-anchor="middle">May 25</text>

  <!-- ─── FOOTER ─── -->
  <rect x="0" y="648" width="1200" height="1" fill="#e2e8f0"/>
  <text x="600" y="663" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" fill="#64748b" text-anchor="middle">Cross-Lingual ESAS · Weekly Progress · 2026-05-25</text>
</svg>
