<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <filter id="sh" x="-8%" y="-8%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#00000018"/>
    </filter>
    <!-- arrows -->
    <marker id="a-dark" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#334155"/>
    </marker>
    <marker id="a-green" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#059669"/>
    </marker>
    <marker id="a-red" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#dc2626"/>
    </marker>
    <marker id="a-amber" markerWidth="9" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <path d="M0,0 L0,7 L9,3.5 z" fill="#d97706"/>
    </marker>
  </defs>

  <rect width="1200" height="675" fill="#ffffff"/>
  <rect width="1200" height="6" fill="#1e3a5f"/>

  <!-- Title -->
  <text x="60" y="55" font-family="'Helvetica Neue', Arial, sans-serif" font-size="26" font-weight="700" fill="#1e3a5f">Research Methodology — Experiment Decision Flow</text>
  <rect x="60" y="68" width="1080" height="2" fill="#e2e8f0"/>

  <!-- ─────── COLUMN 1: Main flow (x center ≈ 220) ─────── -->
  <!-- Column label -->
  <text x="220" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">PHASE 1 · BASELINE</text>

  <!-- START node -->
  <rect x="120" y="98" width="200" height="38" rx="19" fill="#1e3a5f" filter="url(#sh)"/>
  <text x="220" y="122" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">START · Data Collection</text>
  <!-- arrow down -->
  <line x1="220" y1="136" x2="220" y2="158" stroke="#334155" stroke-width="2" marker-end="url(#a-dark)"/>

  <!-- Process: GPT-4 Zero-Shot -->
  <rect x="110" y="158" width="220" height="52" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="220" y="180" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a5f" text-anchor="middle">GPT-4 Zero-Shot</text>
  <text x="220" y="197" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Baseline · 8 prompts · ASAP-SAS</text>
  <!-- arrow down -->
  <line x1="220" y1="210" x2="220" y2="230" stroke="#334155" stroke-width="2" marker-end="url(#a-dark)"/>

  <!-- Decision: QWK ≥ 0.80? -->
  <polygon points="220,230 330,267 220,304 110,267" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <text x="220" y="261" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">QWK ≥ 0.80?</text>
  <text x="220" y="277" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#b45309" text-anchor="middle">(0.674 — No)</text>
  <!-- NO arrow down (main path) -->
  <line x1="220" y1="304" x2="220" y2="324" stroke="#334155" stroke-width="2" marker-end="url(#a-dark)"/>
  <text x="228" y="316" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#374151">No →</text>
  <!-- YES arrow right (branch, killed early) -->
  <line x1="330" y1="267" x2="390" y2="267" stroke="#059669" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#a-green)"/>
  <text x="352" y="258" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#059669">Yes</text>

  <!-- Process: BERT Fine-Tune -->
  <rect x="110" y="324" width="220" height="52" rx="6" fill="#f1f5f9" stroke="#cbd5e1" stroke-width="1.5" filter="url(#sh)"/>
  <text x="220" y="346" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#1e3a5f" text-anchor="middle">BERT Fine-Tuning</text>
  <text x="220" y="362" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Per-prompt + rubric prefix</text>
  <!-- arrow down -->
  <line x1="220" y1="376" x2="220" y2="396" stroke="#334155" stroke-width="2" marker-end="url(#a-dark)"/>

  <!-- Decision: EN QWK ≥ 0.82? -->
  <polygon points="220,396 330,433 220,470 110,433" fill="#fff7ed" stroke="#d97706" stroke-width="2" filter="url(#sh)"/>
  <text x="220" y="427" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#92400e" text-anchor="middle">EN QWK ≥ 0.82?</text>
  <text x="220" y="443" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">(0.836 — Yes)</text>
  <!-- YES arrow down -->
  <line x1="220" y1="470" x2="220" y2="490" stroke="#059669" stroke-width="2" marker-end="url(#a-green)"/>
  <text x="228" y="482" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#059669">Yes ↓</text>
  <!-- NO arrow left (iterate) -->
  <line x1="110" y1="433" x2="68" y2="433" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a-red)"/>
  <line x1="68" y1="433" x2="68" y2="350" stroke="#dc2626" stroke-width="1.5"/>
  <line x1="68" y1="350" x2="108" y2="350" stroke="#dc2626" stroke-width="1.5" marker-end="url(#a-red)"/>
  <text x="44" y="393" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">Tune</text>
  <text x="44" y="404" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">hyper-</text>
  <text x="44" y="415" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle">params</text>

  <!-- Process: Cross-Lingual Eval -->
  <rect x="110" y="490" width="220" height="52" rx="6" fill="#f0fdf4" stroke="#bbf7d0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="220" y="512" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#059669" text-anchor="middle">Cross-Lingual Eval</text>
  <text x="220" y="528" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#374151" text-anchor="middle">Apply to zh-TW test set</text>
  <!-- arrow down -->
  <line x1="220" y1="542" x2="220" y2="562" stroke="#059669" stroke-width="2" marker-end="url(#a-green)"/>

  <!-- ─────── COLUMN 2: DIF Branch (x center ≈ 600) ─────── -->
  <!-- Column divider -->
  <line x1="440" y1="80" x2="440" y2="640" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="600" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">PHASE 2 · FAIRNESS</text>

  <!-- Connector from col1 to col2 (horizontal from 220 to 490) -->
  <line x1="330" y1="572" x2="490" y2="572" stroke="#059669" stroke-width="2" marker-end="url(#a-green)"/>
  <!-- Label on the connector arrow -->
  <rect x="340" y="557" width="120" height="18" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="400" y="569" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">zh-TW QWK = 0.811</text>

  <!-- DIF Analysis box -->
  <rect x="490" y="548" width="220" height="52" rx="6" fill="#fff7ed" stroke="#fde68a" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="570" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="600" fill="#92400e" text-anchor="middle">DIF Analysis</text>
  <text x="600" y="586" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#64748b" text-anchor="middle">Mantel-Haenszel · 12 levels</text>
  <!-- arrow down -->
  <line x1="600" y1="600" x2="600" y2="620" stroke="#334155" stroke-width="2" marker-end="url(#a-dark)"/>

  <!-- Decision: DIF flags > 0? -->
  <polygon points="600,620 720,645 600,670 480,645" fill="#fff" stroke="#334155" stroke-width="1.5" filter="url(#sh)"/>
  <text x="600" y="639" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#374151" text-anchor="middle">DIF flags &gt; 0?</text>
  <text x="600" y="655" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">(0 — No)</text>

  <!-- ─────── COLUMN 3: Model Selection path (x center ≈ 960) ─────── -->
  <line x1="800" y1="80" x2="800" y2="640" stroke="#e2e8f0" stroke-width="1" stroke-dasharray="6,4"/>
  <text x="960" y="90" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#64748b" text-anchor="middle" letter-spacing="1">PHASE 3 · SELECTION</text>

  <!-- From "Yes" at top (GPT-4 decision) -->
  <rect x="390" y="248" width="200" height="38" rx="6" fill="#dcfce7" stroke="#059669" stroke-width="1.5" filter="url(#sh)"/>
  <text x="490" y="272" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#059669" text-anchor="middle">(Not reached — baseline</text>
  <line x1="490" y1="286" x2="490" y2="295" stroke="#94a3b8" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="490" y="310" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#94a3b8" text-anchor="middle">insufficient for publication)</text>

  <!-- Three model strategy comparison (placed in col 3) -->
  <rect x="820" y="108" width="340" height="410" rx="8" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1.5" filter="url(#sh)"/>
  <text x="990" y="132" font-family="'Helvetica Neue', Arial, sans-serif" font-size="12" font-weight="700" fill="#374151" text-anchor="middle">Model Strategy Comparison</text>

  <!-- Strategy rows -->
  <rect x="836" y="144" width="308" height="68" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="856" y="164" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#64748b">Strategy A: Zero-Shot (EN-BERT)</text>
  <text x="856" y="182" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#94a3b8">Cost: $0 extra · Speed: Instant</text>
  <rect x="1070" y="152" width="66" height="18" rx="3" fill="#fee2e2"/>
  <text x="1103" y="165" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#dc2626" text-anchor="middle" font-weight="600">REJECTED</text>
  <text x="856" y="200" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#dc2626">✗ QWK=0.541 · 6/12 DIF flags</text>

  <rect x="836" y="224" width="308" height="68" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="856" y="244" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#64748b">Strategy B: mBERT (Translated)</text>
  <text x="856" y="262" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#94a3b8">Cost: Translation pipeline · +2 days</text>
  <rect x="1064" y="232" width="72" height="18" rx="3" fill="#fef3c7"/>
  <text x="1100" y="245" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#d97706" text-anchor="middle" font-weight="600">PARTIAL</text>
  <text x="856" y="280" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#d97706">~ QWK=0.784 · 2/12 DIF flags</text>

  <rect x="836" y="304" width="308" height="68" rx="4" fill="#f0fdf4" stroke="#059669" stroke-width="2"/>
  <text x="856" y="324" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="600" fill="#059669">Strategy C: ZH-BERT (Lang-Matched)</text>
  <text x="856" y="342" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#64748b">Cost: zh-TW annotation · +1 week</text>
  <rect x="1062" y="312" width="74" height="18" rx="3" fill="#dcfce7" stroke="#059669" stroke-width="1"/>
  <text x="1099" y="325" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="700">SELECTED ★</text>
  <text x="856" y="360" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#059669">✓ QWK=0.811 · 0/12 DIF flags</text>

  <!-- Decision criteria box -->
  <rect x="836" y="384" width="308" height="120" rx="4" fill="#fff" stroke="#e2e8f0" stroke-width="1"/>
  <text x="990" y="404" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" font-weight="700" fill="#374151" text-anchor="middle">Selection Criteria</text>
  <text x="856" y="424" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#374151">① zh-TW QWK ≥ 0.80 (publication threshold)</text>
  <text x="856" y="441" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#374151">② EN↔zh-TW gap ≤ 0.03 (annotation noise)</text>
  <text x="856" y="458" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#374151">③ DIF flags = 0 (fairness requirement)</text>
  <text x="856" y="475" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#374151">④ No significant EN performance loss</text>
  <rect x="856" y="485" width="268" height="14" rx="3" fill="#dcfce7"/>
  <text x="990" y="496" font-family="'Helvetica Neue', Arial, sans-serif" font-size="9" fill="#059669" text-anchor="middle" font-weight="600">ZH-BERT-FT passes all 4 criteria</text>

  <!-- ACCEPT terminal (bottom of col 2, from DIF decision NO) -->
  <line x1="480" y1="645" x2="378" y2="645" stroke="#059669" stroke-width="2" marker-end="url(#a-green)"/>
  <text x="432" y="636" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#059669" text-anchor="middle">No flags</text>
  <rect x="178" y="630" width="200" height="36" rx="18" fill="#059669" filter="url(#sh)"/>
  <text x="278" y="653" font-family="'Helvetica Neue', Arial, sans-serif" font-size="13" font-weight="700" fill="#fff" text-anchor="middle">ACCEPT — Begin Draft</text>

  <!-- ITERATE loop (DIF > 0 → back to model) -->
  <line x1="720" y1="645" x2="782" y2="645" stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#a-red)"/>
  <text x="750" y="636" font-family="'Helvetica Neue', Arial, sans-serif" font-size="10" fill="#dc2626" text-anchor="middle">Flags &gt; 0</text>
  <rect x="782" y="630" width="200" height="36" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5" filter="url(#sh)"/>
  <text x="882" y="653" font-family="'Helvetica Neue', Arial, sans-serif" font-size="11" fill="#dc2626" text-anchor="middle">Iterate → Contrastive Aug.</text>

  <!-- ─────── Footer ─────── -->
  <rect x="0" y="648" width="1200" height="1" fill="#e2e8f0" y="none"/>
  <!-- actually footer is below the slide -->
</svg>
